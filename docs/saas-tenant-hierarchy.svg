<svg width="100%" viewBox="0 0 820 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"/></marker></defs>

<!-- Level 1: Platform -->
<rect x="200" y="20" width="420" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="410" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#3C3489">Level 1 — Platform (SaaS Operator)</text>
<text x="410" y="60" text-anchor="middle" font-size="11" fill="#534AB7">Tenant registry · Subscription plans · Platform admin panel · No restaurant data visible</text>

<!-- Auth label for Level 1 -->
<rect x="640" y="28" width="170" height="44" rx="4" fill="#fff" stroke="#534AB7" stroke-width="0.5"/>
<text x="725" y="46" text-anchor="middle" font-size="10" font-weight="600" fill="#3C3489">Guard: platform</text>
<text x="725" y="60" text-anchor="middle" font-size="9" fill="#534AB7">JWT: { user_type: "platform_admin" }</text>

<!-- Level 2: Tenants -->
<text x="410" y="106" text-anchor="middle" font-size="10" fill="#888">Each restaurant business that subscribes = one tenant</text>

<rect x="30" y="118" width="360" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="210" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#712B13">Level 2 — Tenant A: "Bella Italia Group"</text>
<text x="210" y="156" text-anchor="middle" font-size="10" fill="#993C1D">tenant_id: uuid-A · plan: Growth · status: active</text>
<text x="210" y="170" text-anchor="middle" font-size="10" fill="#993C1D">All data scoped to this tenant_id</text>

<rect x="430" y="118" width="360" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
<text x="610" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#712B13">Level 2 — Tenant B: "Stack Burger Co."</text>
<text x="610" y="156" text-anchor="middle" font-size="10" fill="#993C1D">tenant_id: uuid-B · plan: Starter · status: active</text>
<text x="610" y="170" text-anchor="middle" font-size="10" fill="#993C1D">COMPLETELY ISOLATED from Tenant A</text>

<!-- Auth label Level 2 -->
<rect x="640" y="106" width="170" height="44" rx="4" fill="#fff" stroke="#993C1D" stroke-width="0.5"/>
<text x="725" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Guard: staff / customer</text>
<text x="725" y="136" text-anchor="middle" font-size="9" fill="#993C1D">JWT: { tenant_id, role_id, permissions[] }</text>

<!-- Level 3: Branches (under Tenant A) -->
<rect x="40" y="236" width="160" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="120" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Branch 1</text>
<text x="120" y="270" text-anchor="middle" font-size="10" fill="#0F6E56">Bella Italia Soho</text>
<text x="120" y="284" text-anchor="middle" font-size="9" fill="#0F6E56">branch_id: uuid-B1</text>

<rect x="220" y="236" width="160" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="300" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Branch 2</text>
<text x="300" y="270" text-anchor="middle" font-size="10" fill="#0F6E56">Bella Italia Canary Wharf</text>
<text x="300" y="284" text-anchor="middle" font-size="9" fill="#0F6E56">branch_id: uuid-B2</text>

<!-- Level 3 under Tenant B -->
<rect x="470" y="236" width="280" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="610" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Branch 1</text>
<text x="610" y="270" text-anchor="middle" font-size="10" fill="#0F6E56">Stack Burger Oxford Street</text>
<text x="610" y="284" text-anchor="middle" font-size="9" fill="#0F6E56">branch_id: uuid-B3</text>

<!-- Level 4: Users / Customers -->
<text x="200" y="330" text-anchor="middle" font-size="10" fill="#666">Staff scoped by branch_ids[] in JWT</text>

<rect x="40" y="344" width="120" height="52" rx="5" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="100" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Owner</text>
<text x="100" y="376" text-anchor="middle" font-size="9" fill="#185FA5">branch_ids: "all"</text>
<text x="100" y="388" text-anchor="middle" font-size="9" fill="#185FA5">all permissions</text>

<rect x="175" y="344" width="120" height="52" rx="5" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="235" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Branch Manager</text>
<text x="235" y="376" text-anchor="middle" font-size="9" fill="#185FA5">branch_ids: [uuid-B1]</text>
<text x="235" y="388" text-anchor="middle" font-size="9" fill="#185FA5">branch-scoped perms</text>

<rect x="310" y="344" width="100" height="52" rx="5" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="360" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Waiter</text>
<text x="360" y="376" text-anchor="middle" font-size="9" fill="#185FA5">branch_ids: [uuid-B1]</text>
<text x="360" y="388" text-anchor="middle" font-size="9" fill="#185FA5">orders.view, create</text>

<!-- Customer level -->
<text x="200" y="432" text-anchor="middle" font-size="10" fill="#666">Customer profiles — scoped to tenant_id (see Discussion 3 for cross-tenant customer question)</text>

<rect x="40" y="448" width="360" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="220" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Level 4 — Customer (Loyalty Portal User)</text>
<text x="220" y="480" text-anchor="middle" font-size="10" fill="#0F6E56">customer_profiles.tenant_id = tenant-A · Guard: customer</text>
<text x="220" y="494" text-anchor="middle" font-size="10" fill="#0F6E56">Sees: own loyalty balance, bookings, GDPR data · Cannot see staff or other customers</text>

<!-- Isolation barrier -->
<line x1="420" y1="100" x2="420" y2="520" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="8,4"/>
<text x="420" y="540" text-anchor="middle" font-size="10" font-weight="600" fill="#A32D2D">TENANT ISOLATION BOUNDARY</text>
<text x="420" y="556" text-anchor="middle" font-size="10" fill="#A32D2D">TenantScope Global Scope on every Eloquent model · JWT tenant_id enforced on every request</text>

<!-- Arrows from Platform to Tenants -->
<line x1="280" y1="80" x2="210" y2="118" stroke="#534AB7" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>
<line x1="510" y1="80" x2="560" y2="118" stroke="#534AB7" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>

<!-- Arrows Tenant A to Branches -->
<line x1="140" y1="188" x2="110" y2="236" stroke="#993C1D" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>
<line x1="240" y1="188" x2="285" y2="236" stroke="#993C1D" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>

<!-- Arrows Tenant B to Branch -->
<line x1="610" y1="188" x2="610" y2="236" stroke="#993C1D" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>

<!-- Arrows branches to staff -->
<line x1="115" y1="296" x2="100" y2="344" stroke="#0F6E56" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>
<line x1="290" y1="296" x2="240" y2="344" stroke="#0F6E56" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>

<!-- Arrows tenant to customers -->
<line x1="160" y1="188" x2="160" y2="448" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)" fill="none"/>
</svg>
