<svg width="100%" viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"/></marker></defs>

<!-- Request -->
<rect x="30" y="180" width="100" height="50" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="80" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">HTTP Request</text>
<text x="80" y="218" text-anchor="middle" font-size="10" fill="#5F5E5A">Bearer token + X-Branch-Id</text>

<!-- Step 1: Sanctum Token -->
<rect x="160" y="160" width="130" height="90" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="225" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">Sanctum Auth</text>
<text x="225" y="198" text-anchor="middle" font-size="10" fill="#534AB7">Verify token</text>
<text x="225" y="212" text-anchor="middle" font-size="10" fill="#534AB7">Resolve guard:</text>
<text x="225" y="226" text-anchor="middle" font-size="10" fill="#534AB7">staff|customer|platform</text>
<text x="225" y="240" text-anchor="middle" font-size="9" fill="#534AB7">→ 401 if invalid</text>

<!-- Step 2: Tenant Middleware -->
<rect x="320" y="160" width="130" height="90" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="385" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">TenantMiddleware</text>
<text x="385" y="198" text-anchor="middle" font-size="10" fill="#993C1D">Set tenant_id from JWT</text>
<text x="385" y="212" text-anchor="middle" font-size="10" fill="#993C1D">Initialise TenantScope</text>
<text x="385" y="226" text-anchor="middle" font-size="10" fill="#993C1D">Validate branch_id</text>
<text x="385" y="240" text-anchor="middle" font-size="9" fill="#993C1D">→ 403 if wrong branch</text>

<!-- Step 3: Permission Middleware -->
<rect x="480" y="160" width="130" height="90" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="545" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">PermissionMiddleware</text>
<text x="545" y="198" text-anchor="middle" font-size="10" fill="#0F6E56">Check Redis cache</text>
<text x="545" y="212" text-anchor="middle" font-size="10" fill="#0F6E56">perms:{tid}:{uid}</text>
<text x="545" y="226" text-anchor="middle" font-size="10" fill="#0F6E56">TTL: 5 minutes</text>
<text x="545" y="240" text-anchor="middle" font-size="9" fill="#0F6E56">→ 403 if not in list</text>

<!-- Step 4: Controller -->
<rect x="640" y="180" width="100" height="50" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="690" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#0C447C">Controller</text>
<text x="690" y="218" text-anchor="middle" font-size="10" fill="#185FA5">Business logic runs</text>

<!-- Arrows -->
<line x1="130" y1="205" x2="158" y2="205" stroke="#888" stroke-width="1" marker-end="url(#arr)" fill="none"/>
<line x1="290" y1="205" x2="318" y2="205" stroke="#888" stroke-width="1" marker-end="url(#arr)" fill="none"/>
<line x1="450" y1="205" x2="478" y2="205" stroke="#888" stroke-width="1" marker-end="url(#arr)" fill="none"/>
<line x1="610" y1="205" x2="638" y2="205" stroke="#888" stroke-width="1" marker-end="url(#arr)" fill="none"/>

<!-- Cache miss path -->
<rect x="480" y="290" width="250" height="60" rx="5" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="605" y="312" text-anchor="middle" font-size="10" font-weight="600" fill="#633806">Redis Cache Miss →</text>
<text x="605" y="326" text-anchor="middle" font-size="10" fill="#854F0B">Query: role_permissions JOIN permissions</text>
<text x="605" y="340" text-anchor="middle" font-size="10" fill="#854F0B">WHERE role_id = user.active_role_id</text>

<line x1="545" y1="250" x2="545" y2="290" stroke="#854F0B" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)" fill="none"/>
<line x1="730" y1="290" x2="730" y2="262" stroke="#854F0B" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)" fill="none"/>
<text x="742" y="278" font-size="9" fill="#854F0B">→ cache</text>

<!-- Audit on 403 -->
<rect x="160" y="290" width="250" height="50" rx="5" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
<text x="285" y="311" text-anchor="middle" font-size="10" font-weight="600" fill="#791F1F">On 403: Audit Log Entry</text>
<text x="285" y="325" text-anchor="middle" font-size="10" fill="#A32D2D">actor, endpoint, required_permission, timestamp</text>

<line x1="385" y1="250" x2="285" y2="290" stroke="#A32D2D" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)" fill="none"/>

<!-- Role change invalidation -->
<rect x="30" y="290" width="100" height="50" rx="5" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="80" y="310" text-anchor="middle" font-size="10" font-weight="600" fill="#2C2C2A">Role Changed</text>
<text x="80" y="324" text-anchor="middle" font-size="9" fill="#5F5E5A">cache→delete</text>
<text x="80" y="336" text-anchor="middle" font-size="9" fill="#5F5E5A">perms:{tid}:{uid}</text>

<line x1="80" y1="290" x2="80" y2="210" stroke="#5F5E5A" stroke-width="0.8" stroke-dasharray="4,3" fill="none"/>
<line x1="80" y1="210" x2="158" y2="210" stroke="#5F5E5A" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)" fill="none"/>
<text x="116" y="224" text-anchor="middle" font-size="9" fill="#5F5E5A">re-resolves</text>

<!-- Labels -->
<text x="380" y="380" text-anchor="middle" font-size="10" fill="#666">Permission slugs are constants in config/permissions.php · Role → slug mapping lives in role_permissions DB table</text>
<text x="380" y="396" text-anchor="middle" font-size="10" fill="#666">Never check role name directly: always Gate::check('permission.slug') · Cache TTL 5 min ensures changes propagate quickly</text>
</svg>
