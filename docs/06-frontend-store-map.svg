<svg width="100%" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif" font-size="10">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"/></marker></defs>

<!-- RootStore -->
<rect x="340" y="20" width="220" height="64" rx="6" fill="#534AB7" stroke="#3C3489" stroke-width="1.5"/>
<text x="450" y="42" text-anchor="middle" font-weight="700" fill="#fff" font-size="13">RootStore (MST)</text>
<text x="450" y="58" text-anchor="middle" fill="#CECBF6" font-size="10">Singleton · React Context provider</text>
<text x="450" y="72" text-anchor="middle" fill="#CECBF6" font-size="10">reset() clears all stores on logout</text>

<!-- AuthStore -->
<rect x="20" y="140" width="200" height="110" rx="5" fill="#185FA5" stroke="#0C447C" stroke-width="1"/>
<rect x="20" y="140" width="200" height="20" rx="5" fill="#0C447C"/>
<text x="120" y="154" text-anchor="middle" font-weight="700" fill="#fff">AuthStore</text>
<text x="28" y="172" fill="#B5D4F4">userId, tenantId, tenantName</text>
<text x="28" y="184" fill="#B5D4F4">roleSlug, currentBranchId</text>
<text x="28" y="196" fill="#B5D4F4">branchIds[], permissions[]</text>
<text x="28" y="208" fill="#378ADD">can(slug): boolean</text>
<text x="28" y="220" fill="#378ADD">canAny(slugs[]): boolean</text>
<text x="28" y="232" fill="#378ADD">login(), logout()</text>
<text x="28" y="244" fill="#B5D4F4">↳ caches token in localStorage</text>

<!-- OrderStore -->
<rect x="240" y="140" width="190" height="110" rx="5" fill="#993C1D" stroke="#712B13" stroke-width="1"/>
<rect x="240" y="140" width="190" height="20" rx="5" fill="#712B13"/>
<text x="335" y="154" text-anchor="middle" font-weight="700" fill="#fff">OrderStore</text>
<text x="248" y="172" fill="#F5C4B3">orders: Map(id → OrderModel)</text>
<text x="248" y="184" fill="#F5C4B3">isLoading: boolean</text>
<text x="248" y="196" fill="#F0997B">fetchActive(branchId)</text>
<text x="248" y="208" fill="#F0997B">updateStatus(id, status)</text>
<text x="248" y="220" fill="#F0997B">addOrder(order)</text>
<text x="248" y="232" fill="#F0997B">subscribeToChannel()</text>
<text x="248" y="244" fill="#F5C4B3">↳ Reverb: .orders channel</text>

<!-- MenuStore -->
<rect x="450" y="140" width="190" height="110" rx="5" fill="#3B6D11" stroke="#27500A" stroke-width="1"/>
<rect x="450" y="140" width="190" height="20" rx="5" fill="#27500A"/>
<text x="545" y="154" text-anchor="middle" font-weight="700" fill="#fff">MenuStore</text>
<text x="458" y="172" fill="#C0DD97">categories: Map</text>
<text x="458" y="184" fill="#C0DD97">items: Map(id → MenuItemModel)</text>
<text x="458" y="196" fill="#97C459">fetchForBranch(branchId)</text>
<text x="458" y="208" fill="#97C459">eightySix(itemId)</text>
<text x="458" y="220" fill="#97C459">restore(itemId)</text>
<text x="458" y="232" fill="#97C459">applyBranchOverrides()</text>
<text x="458" y="244" fill="#C0DD97">↳ Reverb: item availability</text>

<!-- ReservationStore -->
<rect x="660" y="140" width="210" height="110" rx="5" fill="#0F6E56" stroke="#085041" stroke-width="1"/>
<rect x="660" y="140" width="210" height="20" rx="5" fill="#085041"/>
<text x="765" y="154" text-anchor="middle" font-weight="700" fill="#fff">ReservationStore</text>
<text x="668" y="172" fill="#9FE1CB">reservations: Map</text>
<text x="668" y="184" fill="#9FE1CB">tables: Map(id → TableModel)</text>
<text x="668" y="196" fill="#5DCAA5">fetchFloorPlan(branchId)</text>
<text x="668" y="208" fill="#5DCAA5">updateTableStatus(id, status)</text>
<text x="668" y="220" fill="#5DCAA5">checkAvailability(date, size)</text>
<text x="668" y="232" fill="#5DCAA5">matchWalkIn(phone)</text>
<text x="668" y="244" fill="#9FE1CB">↳ Reverb: .tables channel</text>

<!-- InventoryStore -->
<rect x="20" y="310" width="190" height="100" rx="5" fill="#854F0B" stroke="#633806" stroke-width="1"/>
<rect x="20" y="310" width="190" height="20" rx="5" fill="#633806"/>
<text x="115" y="324" text-anchor="middle" font-weight="700" fill="#fff">InventoryStore</text>
<text x="28" y="342" fill="#FAC775">items: Map(id → InventoryModel)</text>
<text x="28" y="354" fill="#FAC775">kdsTickets: Map</text>
<text x="28" y="366" fill="#EF9F27">fetchStock(branchId)</text>
<text x="28" y="378" fill="#EF9F27">acknowledgeAllergen(ticketId)</text>
<text x="28" y="390" fill="#EF9F27">markPrepared(ticketId)</text>
<text x="28" y="402" fill="#FAC775">↳ Reverb: .kds channel</text>

<!-- CustomerStore -->
<rect x="230" y="310" width="190" height="100" rx="5" fill="#993556" stroke="#72243E" stroke-width="1"/>
<rect x="230" y="310" width="190" height="20" rx="5" fill="#72243E"/>
<text x="325" y="324" text-anchor="middle" font-weight="700" fill="#fff">CustomerStore</text>
<text x="238" y="342" fill="#F4C0D1">profiles: Map</text>
<text x="238" y="354" fill="#F4C0D1">loyaltyTransactions: Map</text>
<text x="238" y="366" fill="#ED93B1">searchProfile(phone)</text>
<text x="238" y="378" fill="#ED93B1">awardPoints(profileId, pts)</text>
<text x="238" y="390" fill="#ED93B1">redeemPoints(profileId, pts)</text>
<text x="238" y="402" fill="#F4C0D1">↳ API: /customers/*</text>

<!-- EventStore -->
<rect x="440" y="310" width="190" height="100" rx="5" fill="#993C1D" stroke="#712B13" stroke-width="1"/>
<rect x="440" y="310" width="190" height="20" rx="5" fill="#712B13"/>
<text x="535" y="324" text-anchor="middle" font-weight="700" fill="#fff">EventStore</text>
<text x="448" y="342" fill="#F5C4B3">events: Map(id → EventModel)</text>
<text x="448" y="354" fill="#F5C4B3">enquiries: Map</text>
<text x="448" y="366" fill="#F0997B">fetchEnquiries(branchId)</text>
<text x="448" y="378" fill="#F0997B">advanceStatus(eventId)</text>
<text x="448" y="390" fill="#F0997B">collectDeposit(eventId)</text>
<text x="448" y="402" fill="#F5C4B3">↳ API: /events/*</text>

<!-- AnalyticsStore -->
<rect x="650" y="310" width="220" height="100" rx="5" fill="#3C3489" stroke="#26215C" stroke-width="1"/>
<rect x="650" y="310" width="220" height="20" rx="5" fill="#26215C"/>
<text x="760" y="324" text-anchor="middle" font-weight="700" fill="#fff">AnalyticsStore</text>
<text x="658" y="342" fill="#CECBF6">dashboardData: frozen()</text>
<text x="658" y="354" fill="#CECBF6">selectedPeriod, branchFilter</text>
<text x="658" y="366" fill="#AFA9EC">fetchOwnerDashboard()</text>
<text x="658" y="378" fill="#AFA9EC">fetchBranchDashboard(id)</text>
<text x="658" y="390" fill="#AFA9EC">fetchRFMSegments()</text>
<text x="658" y="402" fill="#CECBF6">↳ API: /analytics/* (read-only)</text>

<!-- UIStore -->
<rect x="340" y="460" width="220" height="80" rx="5" fill="#444441" stroke="#2C2C2A" stroke-width="1"/>
<rect x="340" y="460" width="220" height="20" rx="5" fill="#2C2C2A"/>
<text x="450" y="474" text-anchor="middle" font-weight="700" fill="#fff">UIStore</text>
<text x="348" y="492" fill="#D3D1C7">loadingStates: Map(key → bool)</text>
<text x="348" y="504" fill="#D3D1C7">activeModal, toasts[]</text>
<text x="348" y="516" fill="#B4B2A9">setLoading(key), addToast()</text>
<text x="348" y="528" fill="#B4B2A9">↳ No server state — UI only</text>

<!-- Arrows from RootStore to all child stores -->
<line x1="390" y1="84" x2="180" y2="140" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
<line x1="420" y1="84" x2="335" y2="140" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
<line x1="450" y1="84" x2="450" y2="140" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
<line x1="490" y1="84" x2="600" y2="140" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
<line x1="520" y1="84" x2="760" y2="140" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
<line x1="380" y1="84" x2="115" y2="310" stroke="#534AB7" stroke-width="0.8" marker-end="url(#arr)"/>
<line x1="410" y1="84" x2="325" y2="310" stroke="#534AB7" stroke-width="0.8" marker-end="url(#arr)"/>
<line x1="460" y1="84" x2="535" y2="310" stroke="#534AB7" stroke-width="0.8" marker-end="url(#arr)"/>
<line x1="500" y1="84" x2="760" y2="310" stroke="#534AB7" stroke-width="0.8" marker-end="url(#arr)"/>
<line x1="450" y1="84" x2="450" y2="460" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)"/>

<!-- AuthStore cross-reference note -->
<text x="120" y="290" text-anchor="middle" font-size="9" fill="#185FA5">authStore.can('permission')</text>
<text x="120" y="302" text-anchor="middle" font-size="9" fill="#185FA5">called in every store + component</text>

<!-- Pattern note -->
<rect x="10" y="552" width="880" height="22" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="450" y="567" text-anchor="middle" font-size="9" fill="#444">MST rule: server data lives in stores only. Components use observer() + useStore() hook. WebSocket events call store actions directly. Never useState() for API data.</text>
</svg>
