<!-- Legend -->
<rect x="30" y="652" width="920" height="36" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="40" y="666" font-size="9" fill="#444">🔑 Primary key</text>
<text x="130" y="666" font-size="9" fill="#444">🔗 Foreign key</text>
<text x="200" y="666" font-size="9" fill="#185FA5">── Relationship (solid)</text>
<text x="340" y="666" font-size="9" fill="#888">- - Derived/cross-module reference</text>
<text x="530" y="666" font-size="9" fill="#444">All tenant tables: WHERE tenant_id = ? applied automatically by TenantScope</text>
<text x="40" y="680" font-size="9" fill="#A32D2D">Audit log: INSERT only — no UPDATE or DELETE ever</text>
<text x="300" y="680" font-size="9" fill="#3B6D11">eighty_six_log: trigger_type MUST be checked before allowing restore</text>
<text x="640" y="680" font-size="9" fill="#854F0B">WAC recalculated on every GRN → propagates to menu_items.cost_price</text>
</svg>
