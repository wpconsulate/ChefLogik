<svg width="100%" viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"/></marker></defs>

<!-- Browser / Clients -->
<rect x="20" y="20" width="140" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="90" y="35" text-anchor="middle" font-size="11" font-weight="600" fill="#0C447C">Staff Browser</text>
<text x="90" y="50" text-anchor="middle" font-size="10" fill="#185FA5">React SPA (TypeScript+MST)</text>

<rect x="175" y="20" width="140" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="245" y="35" text-anchor="middle" font-size="11" font-weight="600" fill="#0C447C">Customer Portal</text>
<text x="245" y="50" text-anchor="middle" font-size="10" fill="#185FA5">React SPA (loyalty, bookings)</text>

<rect x="330" y="20" width="140" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="400" y="35" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">Platform Admin</text>
<text x="400" y="50" text-anchor="middle" font-size="10" fill="#534AB7">SaaS operator panel</text>

<!-- Kubernetes boundary -->
<rect x="10" y="90" width="870" height="380" rx="10" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="6,4"/>
<text x="26" y="108" font-size="10" fill="#888">Kubernetes cluster (namespace: rms-production)</text>

<!-- Ingress -->
<rect x="60" y="118" width="760" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="440" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">NGINX Ingress</text>
<text x="440" y="146" text-anchor="middle" font-size="10" fill="#5F5E5A">/api/* → rms-api   |   ws:// → rms-reverb   |   /* → rms-web</text>

<!-- API pod -->
<rect x="40" y="178" width="200" height="70" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="140" y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">rms-api (3 pods)</text>
<text x="140" y="212" text-anchor="middle" font-size="10" fill="#993C1D">Laravel 12 / PHP-FPM</text>
<text x="140" y="226" text-anchor="middle" font-size="10" fill="#993C1D">HPA: min=2 max=10</text>
<text x="140" y="240" text-anchor="middle" font-size="10" fill="#993C1D">TenantMiddleware + Auth</text>

<!-- Worker pod -->
<rect x="260" y="178" width="180" height="70" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="350" y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#633806">rms-worker (2 pods)</text>
<text x="350" y="212" text-anchor="middle" font-size="10" fill="#854F0B">Laravel Horizon</text>
<text x="350" y="226" text-anchor="middle" font-size="10" fill="#854F0B">Queues: critical, high,</text>
<text x="350" y="240" text-anchor="middle" font-size="10" fill="#854F0B">default, analytics, low</text>

<!-- Scheduler pod -->
<rect x="460" y="178" width="160" height="70" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="540" y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#633806">rms-scheduler</text>
<text x="540" y="212" text-anchor="middle" font-size="10" fill="#854F0B">EXACTLY 1 replica</text>
<text x="540" y="226" text-anchor="middle" font-size="10" fill="#854F0B">Cron: hourly agg,</text>
<text x="540" y="240" text-anchor="middle" font-size="10" fill="#854F0B">daily agg, weekly RFM</text>

<!-- Reverb pod -->
<rect x="640" y="178" width="160" height="70" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="720" y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">rms-reverb (2 pods)</text>
<text x="720" y="212" text-anchor="middle" font-size="10" fill="#534AB7">Laravel Reverb</text>
<text x="720" y="226" text-anchor="middle" font-size="10" fill="#534AB7">WebSocket server</text>
<text x="720" y="240" text-anchor="middle" font-size="10" fill="#534AB7">Pusher-protocol</text>

<!-- Data layer -->
<rect x="40" y="290" width="190" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="135" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">PostgreSQL 16</text>
<text x="135" y="325" text-anchor="middle" font-size="10" fill="#0F6E56">Primary + Read replica</text>
<text x="135" y="340" text-anchor="middle" font-size="10" fill="#0F6E56">tenant_id on all tables</text>

<rect x="250" y="290" width="190" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="345" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Redis 7</text>
<text x="345" y="325" text-anchor="middle" font-size="10" fill="#0F6E56">Cache: perms, tokens</text>
<text x="345" y="340" text-anchor="middle" font-size="10" fill="#0F6E56">Queues: Horizon</text>

<rect x="460" y="290" width="190" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="555" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">S3-Compatible</text>
<text x="555" y="325" text-anchor="middle" font-size="10" fill="#0F6E56">Photos, exports,</text>
<text x="555" y="340" text-anchor="middle" font-size="10" fill="#0F6E56">receipts, reports</text>

<!-- Web pod -->
<rect x="670" y="290" width="150" height="60" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="745" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">rms-web (2 pods)</text>
<text x="745" y="325" text-anchor="middle" font-size="10" fill="#993C1D">Nginx + React build</text>
<text x="745" y="340" text-anchor="middle" font-size="10" fill="#993C1D">Static assets</text>

<!-- Tenant boundary label -->
<rect x="10" y="390" width="870" height="24" rx="4" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="445" y="406" text-anchor="middle" font-size="10" fill="#0C447C">All pods: TenantMiddleware resolves tenant_id from JWT → TenantScope applied to all Eloquent queries → cross-tenant data access impossible</text>

<!-- External integrations -->
<rect x="10" y="490" width="870" height="80" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
<text x="26" y="510" font-size="11" font-weight="600" fill="#633806">External Integrations</text>

<rect x="30" y="520" width="130" height="38" rx="4" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
<text x="95" y="536" text-anchor="middle" font-size="10" font-weight="600" fill="#633806">Stripe</text>
<text x="95" y="550" text-anchor="middle" font-size="9" fill="#854F0B">Payments+Terminal+Webhooks</text>

<rect x="175" y="520" width="130" height="38" rx="4" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
<text x="240" y="536" text-anchor="middle" font-size="10" font-weight="600" fill="#633806">Uber Eats</text>
<text x="240" y="550" text-anchor="middle" font-size="9" fill="#854F0B">Menu+Orders+StoreStatus</text>

<rect x="320" y="520" width="130" height="38" rx="4" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
<text x="385" y="536" text-anchor="middle" font-size="10" font-weight="600" fill="#633806">DoorDash</text>
<text x="385" y="550" text-anchor="middle" font-size="9" fill="#854F0B">Menu+Orders+StoreStatus</text>

<rect x="465" y="520" width="130" height="38" rx="4" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
<text x="530" y="536" text-anchor="middle" font-size="10" font-weight="600" fill="#633806">Twilio</text>
<text x="530" y="550" text-anchor="middle" font-size="9" fill="#854F0B">SMS + delivery receipts</text>

<rect x="610" y="520" width="130" height="38" rx="4" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
<text x="675" y="536" text-anchor="middle" font-size="10" font-weight="600" fill="#633806">SendGrid</text>
<text x="675" y="550" text-anchor="middle" font-size="9" fill="#854F0B">Email + templates</text>

<rect x="755" y="520" width="110" height="38" rx="4" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
<text x="810" y="536" text-anchor="middle" font-size="10" font-weight="600" fill="#633806">Terraform</text>
<text x="810" y="550" text-anchor="middle" font-size="9" fill="#854F0B">Cloud infra (Postgres/Redis)</text>

<!-- Arrows: clients to ingress -->
<line x1="90" y1="60" x2="280" y2="118" stroke="#888" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>
<line x1="245" y1="60" x2="360" y2="118" stroke="#888" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>
<line x1="400" y1="60" x2="440" y2="118" stroke="#888" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>

<!-- Arrows: ingress to pods -->
<line x1="200" y1="154" x2="160" y2="178" stroke="#888" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>
<line x1="440" y1="154" x2="540" y2="178" stroke="#888" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>
<line x1="640" y1="154" x2="720" y2="178" stroke="#888" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>

<!-- Arrows: api to data -->
<line x1="140" y1="248" x2="135" y2="290" stroke="#888" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>
<line x1="160" y1="248" x2="280" y2="290" stroke="#888" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>

<!-- Arrows: worker to data -->
<line x1="350" y1="248" x2="345" y2="290" stroke="#888" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>

<!-- Arrows: api to external -->
<line x1="140" y1="360" x2="95" y2="490" stroke="#EF9F27" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)" fill="none"/>
<line x1="180" y1="350" x2="350" y2="490" stroke="#EF9F27" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)" fill="none"/>

<!-- SaaS label -->
<text x="445" y="628" text-anchor="middle" font-size="10" fill="#666">Multi-tenant SaaS — each tenant's data is isolated via tenant_id Global Scope on all Eloquent models</text>
</svg>
