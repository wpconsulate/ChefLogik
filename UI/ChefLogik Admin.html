<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChefLogik — Platform Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      background: #F4F6F9;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    a { color: inherit; text-decoration: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Shared icon library -->
  <script type="text/babel" src="cl-icons.jsx"></script>

  <!-- Admin shell -->
  <script type="text/babel" src="cl-admin-shell.jsx"></script>

  <!-- Admin screens -->
  <script type="text/babel" src="cl-admin-dashboard.jsx"></script>
  <script type="text/babel" src="cl-admin-screens.jsx"></script>

  <!-- Tweaks panel -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Mount -->
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "layout": "expanded"
    }/*EDITMODE-END*/;

    function AdminWithTweaks() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <>
          <AdminApp layout={t.layout} />
          <TweaksPanel>
            <TweakSection label="Sidebar Layout" />
            <TweakRadio
              label="Sidebar"
              value={t.layout}
              options={['expanded', 'compact']}
              onChange={v => setTweak('layout', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AdminWithTweaks />);
  </script>
</body>
</html>
