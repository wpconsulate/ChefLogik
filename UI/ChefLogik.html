<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChefLogik — Restaurant Management Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      background: #F5F5F5;
      color: #111827;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
    a { color: inherit; }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
      50% { opacity: 0.6; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Icon library -->
  <script type="text/babel" src="cl-icons.jsx"></script>

  <!-- Login flow -->
  <script type="text/babel" src="cl-login.jsx"></script>

  <!-- Shell: sidebar, header, login, router -->
  <script type="text/babel" src="cl-shell.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="cl-dashboard.jsx"></script>
  <script type="text/babel" src="cl-orders.jsx"></script>
  <script type="text/babel" src="cl-kds.jsx"></script>
  <script type="text/babel" src="cl-floor.jsx"></script>
  <script type="text/babel" src="cl-menu.jsx"></script>
  <script type="text/babel" src="cl-staff.jsx"></script>
  <script type="text/babel" src="cl-analytics.jsx"></script>
  <script type="text/babel" src="cl-other.jsx"></script>

  <!-- Tweaks panel -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Mount -->
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "Ocean"
    }/*EDITMODE-END*/;

    function AppWithTweaks() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <>
          <App initialTheme={t.theme} />
          <TweaksPanel>
            <TweakSection label="Brand Theme" />
            <TweakRadio
              label="Colour theme"
              value={t.theme}
              options={['Ocean', 'Forest', 'Sunrise']}
              onChange={v => setTweak('theme', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AppWithTweaks />);
  </script>
</body>
</html>
